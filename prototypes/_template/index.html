<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P0 Prototype Template</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #111827; }
    main { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
    .hero, .panel { background: white; border: 1px solid #e5e7eb; border-radius: 20px; padding: 24px; margin-bottom: 20px; }
    h1 { margin: 0 0 12px; font-size: 40px; }
    p { color: #475569; line-height: 1.7; }
    .grid { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
    label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #334155; }
    select, input, button { width: 100%; padding: 11px 12px; border-radius: 12px; border: 1px solid #cbd5e1; font: inherit; box-sizing: border-box; }
    button { border: 0; background: #111827; color: white; font-weight: 800; cursor: pointer; }
    .field { margin-bottom: 14px; }
    .cards { display: grid; gap: 12px; }
    .card { border: 1px solid #e5e7eb; border-radius: 16px; padding: 16px; background: #f8fafc; }
    .debug { display: none; background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 16px; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; }
    .debug.visible { display: block; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 32px; } }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <strong>P0 htmlpreview prototype</strong>
      <h1>Prototype Template</h1>
      <p>Replace this page with the smallest clickable version of the idea. Keep it static, focused, and easy to review.</p>
    </section>

    <section class="grid">
      <aside class="panel">
        <h2>Controls</h2>
        <div class="field">
          <label for="scenario">Scenario</label>
          <select id="scenario">
            <option value="quick">Quick validation</option>
            <option value="compare">Compare options</option>
            <option value="recommend">Recommend best option</option>
          </select>
        </div>
        <div class="field">
          <label for="intent">Intent</label>
          <input id="intent" value="Validate the main interaction" />
        </div>
        <button id="run">Generate result</button>
      </aside>

      <section class="panel">
        <h2>Output</h2>
        <div class="cards" id="cards"></div>
      </section>
    </section>

    <pre class="debug" id="debug"></pre>
  </main>

  <script>
    const state = {
      prototype: "_template",
      stage: "P0-htmlpreview",
      runtime: "static",
      mode: "mock",
      scenario: "quick",
      intent: "Validate the main interaction",
      lastAction: "initial-render"
    };

    function showDebug() {
      return new URLSearchParams(window.location.search).get("debug") === "1";
    }

    function render() {
      const cards = document.getElementById("cards");
      cards.innerHTML = [
        "Capture the smallest meaningful input.",
        "Show a visible transformation or comparison.",
        "Make the next action obvious and clickable."
      ].map((text, index) => `<div class="card"><strong>Step ${index + 1}</strong><p>${text}</p></div>`).join("");

      const debug = document.getElementById("debug");
      if (showDebug()) {
        debug.classList.add("visible");
        debug.textContent = JSON.stringify(state, null, 2);
      }
    }

    document.getElementById("run").addEventListener("click", () => {
      state.scenario = document.getElementById("scenario").value;
      state.intent = document.getElementById("intent").value;
      state.lastAction = "generate-result";
      render();
    });

    render();
  </script>
</body>
</html>
