<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Horizon 表盘配置推荐器</title>
<style>
:root{--bg:#080d18;--panel:#111936;--panel2:#0c1329;--text:#eef4ff;--muted:#9aabd0;--line:#26365f;--cyan:#59efe6;--blue:#6aa7ff;--good:#84ff92}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 18% 0,#17234d 0,#080d18 42%,#050813 100%);color:var(--text)}button,select,textarea,input{font:inherit}.app{max-width:1440px;margin:0 auto;padding:22px}.card{background:rgba(17,25,54,.86);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.24)}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}.intro{padding:24px}.ey{margin:0 0 10px;color:var(--cyan);font-size:12px;letter-spacing:.14em;text-transform:uppercase}h1{margin:0 0 10px;font-size:34px;line-height:1.15}.intro p,.desc{margin:0;color:var(--muted);line-height:1.65}.goal{padding:20px}.goal h2,.panel h2{font-size:17px;margin:0 0 14px}.chips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.chip{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:12px;border-radius:16px;text-align:left;cursor:pointer}.chip b{display:block;font-size:14px;margin-bottom:4px}.chip span{font-size:12px;color:var(--muted)}.chip.active{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(89,239,230,.16) inset;background:#0f1b36}.main{display:grid;grid-template-columns:330px minmax(0,1fr) 370px;gap:16px;margin-top:16px}.panel{padding:18px}.control label{display:block;color:var(--muted);font-size:12px;margin:12px 0 6px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}select,textarea,input{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:13px;padding:10px 12px}textarea{min-height:150px;resize:vertical;font-size:12px;line-height:1.45}details{margin-top:14px}summary{cursor:pointer;color:#cbd9ff;font-weight:700}.check{display:flex!important;align-items:center;gap:8px;color:#d9e4ff!important}.check input{width:auto}.preview-panel{padding:18px}.preview-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.title{margin:0 0 6px;font-size:22px}.score{font-size:44px;font-weight:900;line-height:1}.score small{font-size:13px;color:var(--muted);font-weight:600;display:block;margin-top:4px}.watchbox{display:flex;align-items:center;justify-content:center;min-height:380px;background:linear-gradient(180deg,#0c1329,#080d18);border:1px solid var(--line);border-radius:22px}.metrics{display:grid;gap:9px;margin-top:14px}.barrow{display:grid;grid-template-columns:82px 1fr 36px;gap:8px;align-items:center;font-size:12px;color:var(--muted)}.bar{height:10px;border-radius:999px;background:#0a1126;overflow:hidden;border:1px solid #24345f}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue))}.fields{display:grid;gap:8px}.field{display:flex;justify-content:space-between;gap:12px;background:var(--panel2);border:1px solid #24345f;border-radius:13px;padding:10px 12px;font-size:13px}.field span{color:var(--muted)}.reason{margin-top:16px;background:var(--panel2);border:1px solid #24345f;border-radius:15px;padding:13px;color:#dce6ff;font-size:13px;line-height:1.7}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.btn{border:none;border-radius:13px;padding:11px 14px;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--blue),#7b61ff);color:white}.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}.ok{min-height:18px;margin-top:8px;color:var(--good);font-size:12px}.section{margin-top:16px}.alts{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}.alt{display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:center;background:var(--panel2);border:1px solid #24345f;border-radius:16px;padding:10px;cursor:pointer}.alt.active{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(89,239,230,.12) inset}.alt h3{margin:0 0 5px;font-size:14px}.alt p{margin:0;color:var(--muted);font-size:12px;line-height:1.4}.pill{display:inline-block;margin-top:7px;color:#cde0ff;background:#111d3c;border:1px solid #314476;border-radius:999px;padding:3px 8px;font-size:11px}.watch{filter:drop-shadow(0 16px 28px rgba(0,0,0,.38))}@media(max-width:1100px){.hero,.main{grid-template-columns:1fr}.watchbox{min-height:320px}}@media(max-width:640px){.app{padding:14px}.chips,.grid2{grid-template-columns:1fr}.alt{grid-template-columns:80px 1fr}.watchbox svg{width:290px;height:290px}}
</style>
</head>
<body>
<div class="app">
  <section class="hero">
    <div class="card intro">
      <p class="ey">Horizon · layout calibration v1</p>
      <h1>先把这个表盘调到你满意</h1>
      <p>这一版开始按 Connect IQ 商店截图校准 Horizon 的几何结构：右上圆形数据区、中间大时间、左上数据组、底部天气/进度组都收敛到固定槽位。后续我们只需要调 layoutSpec，而不是到处改 SVG 坐标。</p>
    </div>
    <div class="card goal"><h2>你这次想优化什么？</h2><div id="goals" class="chips"></div></div>
  </section>

  <main class="main">
    <aside class="card panel control">
      <h2>偏好</h2>
      <div class="grid2">
        <label>设备<select id="device"><option>Forerunner 265</option><option>Venu 3</option><option>Fenix / Epix</option></select></label>
        <label>屏幕习惯<select id="aod"><option value="normal">日常抬腕</option><option value="aod">常亮 / AOD</option></select></label>
      </div>
      <label>主色倾向<select id="accent"><option value="white">白色 / 最接近截图</option><option value="cyan">青色 / 科技感</option><option value="green">绿色 / 运动感</option><option value="orange">橙色 / 高对比</option></select></label>
      <label>信息密度<select id="density"><option value="balanced">平衡</option><option value="minimal">偏简洁</option><option value="data">偏数据流</option></select></label>
      <label class="check"><input id="debug" type="checkbox" />显示布局线</label>
      <details><summary>高级：当前 Horizon schema</summary><textarea id="schema"></textarea></details>
      <div class="actions"><button class="btn ghost" id="regen">重新生成</button><button class="btn ghost" id="copySchema">复制 schema</button></div>
    </aside>

    <section class="card preview-panel">
      <div class="preview-top"><div><h2 class="title" id="title">推荐配置</h2><p class="desc" id="desc">-</p></div><div class="score"><span id="score">-</span><small>综合分</small></div></div>
      <div class="watchbox" id="watch"></div><div class="metrics" id="metrics"></div>
    </section>

    <aside class="card panel">
      <h2>设置与取舍</h2><div id="fields" class="fields"></div><div id="reason" class="reason"></div>
      <div class="actions"><button class="btn primary" id="copySteps">复制手动设置步骤</button><button class="btn ghost" id="copyJson">复制配置 JSON</button></div><div id="status" class="ok"></div>
    </aside>
  </main>

  <section class="card panel section"><h2>可选方案对比</h2><div id="alts" class="alts"></div></section>
</div>
<script>
const $=id=>document.getElementById(id);
const labels={battery_pct:'Battery %',date1:'Date 1',heart_rate:'Heart Rate',steps:'Steps',weather_temp:'Weather',distance:'Distance',active_minutes_week:'Active Minutes',stress:'Stress',body_battery:'Body Battery',altitude:'Altitude',calories_active:'Active Calories',floors_climbed:'Floors',oxygen:'Oxygen',sunrise:'Sunrise',sunset:'Sunset'};
const vals={battery_pct:'75%',date1:'Jun 13',heart_rate:'162',steps:'12456',weather_temp:'17°C',distance:'10.0km',active_minutes_week:'256',stress:'56',body_battery:'62',altitude:'58m',calories_active:'256',floors_climbed:'12',oxygen:'97',sunrise:'05:22',sunset:'19:08'};
const pal={black:'#020202',cyan:'#21dfd4',white:'#eef4ff',green:'#60ff7f',orange:'#ff9f1a',blue:'#4ab8ff',grey:'#8e98a8',yellow:'#e6e766',red:'#ff4f66'};
const schema={topView:['battery_pct','date1','heart_rate','steps','weather_temp','distance'],secondView:['active_minutes_week','stress','body_battery','altitude','calories_active','floors_climbed'],thirdView:['steps','distance','weather_temp','sunrise','sunset','body_battery'],secondBar:['stress','active_minutes_week','body_battery','battery_pct','oxygen','altitude'],circleData:['heart_rate','battery_pct','stress','body_battery','oxygen'],colors:['white','cyan','green','orange']};
const layout={canvas:416,outer:{cx:208,cy:208,r:190},dial:{cx:208,cy:208,r:179},topMeta:{x:150,y:36,lineY:68,w:95},leftIcon:{x:84,y:73},topSecond:{x:151,y:84},leftPrimary:{x:105,y:109},circle:{cx:292,cy:82,r:50,labelY:68,valueY:105},time:{x:52,y:192,font:76,secX:276,secY:190,secFont:31},third:{x:55,y:226,font:23},rightLower:{x:322,y:230},weather:{cx:208,y:275},bottom:{x:75,y:318,w:260,h:42},bar:{x:166,y:347,w:92,h:10}};
const goals={daily:{title:'日常清晰版',short:'日常均衡',desc:'优先可读性、电量、日期和天气。适合每天戴，不需要把所有数据都塞满。',seed:{topView:'battery_pct',secondView:'active_minutes_week',thirdView:'weather_temp',secondBar:'stress',circleData:'heart_rate'},w:{read:32,fit:25,amoled:20,density:12,style:11}},run:{title:'跑步训练版',short:'跑步训练',desc:'心率和距离优先，同时保留电量。适合运动前快速确认关键数据。',seed:{topView:'battery_pct',secondView:'active_minutes_week',thirdView:'distance',secondBar:'heart_rate',circleData:'heart_rate'},w:{read:24,fit:34,amoled:16,density:13,style:13}},night:{title:'夜间省电版',short:'夜间省电',desc:'黑底、低刺激、少字段。适合 AMOLED 和夜间看表，牺牲一部分数据密度。',seed:{topView:'date1',secondView:'body_battery',thirdView:'weather_temp',secondBar:'battery_pct',circleData:'battery_pct'},w:{read:28,fit:22,amoled:34,density:8,style:8}},data:{title:'数据密集版',short:'数据密集',desc:'尽可能多放信息，适合白天查看。可读性和清爽度会略下降。',seed:{topView:'steps',secondView:'active_minutes_week',thirdView:'distance',secondBar:'stress',circleData:'heart_rate'},w:{read:18,fit:28,amoled:12,density:30,style:12}}};
let goal='daily',list=[],sel=null;
function init(){Object.entries(goals).forEach(([k,g])=>{const b=document.createElement('button');b.className='chip';b.dataset.k=k;b.innerHTML='<b>'+g.title+'</b><span>'+g.desc.slice(0,30)+'...</span>';b.onclick=()=>{goal=k;generate()};$('goals').appendChild(b)});$('schema').value=JSON.stringify(schema,null,2);['device','aod','accent','density','debug'].forEach(id=>$(id).onchange=generate);$('regen').onclick=generate;$('copySchema').onclick=()=>copy($('schema').value,'schema 已复制');$('copySteps').onclick=()=>copy(steps(sel),'手动设置步骤已复制');$('copyJson').onclick=()=>copy(JSON.stringify(sel,null,2),'配置 JSON 已复制');generate()}
function makeVariants(seed){const acc=$('accent').value,d=$('density').value;let base={...seed,accent:acc,bg:'black',timeBg:'black',circleBg:'black',barColor:acc};let arr=[base,{...base,thirdView:'distance'},{...base,thirdView:'weather_temp'},{...base,topView:'date1'},{...base,topView:'battery_pct'},{...base,secondView:'stress'},{...base,secondView:'body_battery'},{...base,circleData:'battery_pct'},{...base,circleData:'heart_rate'},{...base,barColor:'green'},{...base,accent:'white'},{...base,accent:'cyan'}];if(d==='minimal')arr=arr.map(x=>({...x,secondView:'body_battery',secondBar:'battery_pct'}));if(d==='data')arr=arr.concat([{...base,topView:'steps',secondView:'active_minutes_week',thirdView:'distance',secondBar:'stress',circleData:'heart_rate'},{...base,topView:'weather_temp',secondView:'altitude',thirdView:'distance',secondBar:'oxygen',circleData:'heart_rate'}]);return arr.map((x,i)=>({...x,id:i+1,title:i===0?'推荐主方案':'备选方案 '+i}))}
function score(c){let g=goals[goal],fit=60,read=80,amoled=90,dens=$('density').value==='data'?88:$('density').value==='minimal'?62:75,style=86;if(c.accent==='white')read+=8;if(c.accent==='orange')read+=3;if(goal==='run'&&c.thirdView==='distance')fit+=18;if(goal==='run'&&c.circleData==='heart_rate')fit+=16;if(goal==='night'&&c.circleData==='battery_pct')fit+=14;if(goal==='daily'&&c.topView==='battery_pct')fit+=10;if(goal==='daily'&&c.thirdView==='weather_temp')fit+=8;if(c.secondView==='body_battery')fit+=6;if($('aod').value==='aod')amoled+=6;if(c.topView===c.circleData||c.thirdView===c.secondBar)dens-=8;read=Math.min(100,read);fit=Math.min(100,fit);amoled=Math.min(100,amoled);dens=Math.max(45,Math.min(100,dens));let total=Math.round((read*g.w.read+fit*g.w.fit+amoled*g.w.amoled+dens*g.w.density+style*g.w.style)/100);return{total,read,fit,amoled,dens,style}}
function generate(){document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.k===goal));const g=goals[goal];list=makeVariants(g.seed).map(c=>({...c,score:score(c)})).sort((a,b)=>b.score.total-a.score.total);sel=list[0];render()}
function render(){const g=goals[goal];$('title').textContent=g.title;$('desc').textContent=g.desc;$('score').textContent=sel.score.total;$('watch').innerHTML=watch(sel,350);$('metrics').innerHTML=bar('可读性',sel.score.read)+bar('场景匹配',sel.score.fit)+bar('AMOLED',sel.score.amoled)+bar('信息密度',sel.score.dens)+bar('Horizon 感',sel.score.style);$('fields').innerHTML=field('Top View',labels[sel.topView])+field('Second View',labels[sel.secondView])+field('Second Bar',labels[sel.secondBar])+field('Third View',labels[sel.thirdView])+field('Circle Data',labels[sel.circleData])+field('Background','Black')+field('Accent',sel.accent);$('reason').innerHTML=reason(sel).join('<br>');$('alts').innerHTML=list.slice(0,8).map(c=>'<div class="alt '+(c.id===sel.id?'active':'')+'" data-id="'+c.id+'"><div>'+watch(c,82)+'</div><div><h3>'+c.title+' · '+c.score.total+' 分</h3><p>Top '+labels[c.topView]+' · Circle '+labels[c.circleData]+' · Bottom '+labels[c.thirdView]+'</p><span class="pill">'+trade()+'</span></div></div>').join('');document.querySelectorAll('.alt').forEach(e=>e.onclick=()=>{sel=list.find(x=>x.id==e.dataset.id);render();window.scrollTo({top:0,behavior:'smooth'})})}
function field(k,v){return'<div class="field"><span>'+k+'</span><b>'+v+'</b></div>'}function bar(k,v){return'<div class="barrow"><span>'+k+'</span><div class="bar"><i style="width:'+v+'%"></i></div><b>'+v+'</b></div>'}function trade(){return goal==='night'?'更省电/少刺激':goal==='run'?'运动核心数据':goal==='data'?'字段更多':'日常均衡'}
function reason(c){let r=[];r.push('这一版按商店截图重调了 Horizon 的固定槽位：右上圆形区更靠近表盘边缘，大时间更低更宽，底部天气/进度条更像原图。');if(c.circleData==='heart_rate')r.push('右上圆形区放心率，接近 Horizon 官方主图里最醒目的运动指标。');if(c.circleData==='battery_pct')r.push('右上圆形区放电量，适合夜间/通勤时一眼确认续航。');if(c.thirdView==='distance')r.push('时间下方放距离，跑步场景比天气更有价值。');if(c.thirdView==='weather_temp')r.push('时间下方放天气，日常抬腕更实用。');r.push('后续如果某个字段仍然偏移，我们只调 layoutSpec 里的对应槽位。');return r}
function steps(c){return['Open Connect IQ Store → My Watch Faces → Horizon → Settings','Background Color: Black','Time background color: Black','Circle background color: Black','Top View: '+labels[c.topView],'Second View: '+labels[c.secondView],'Second Bar: '+labels[c.secondBar],'Third View: '+labels[c.thirdView],'Circle Data: '+labels[c.circleData],'Color Topview Icon / Secondview Icon: '+c.accent,'Color Second Bar: '+c.barColor].join('\n')}
async function copy(t,msg){await navigator.clipboard.writeText(t);$('status').textContent=msg;setTimeout(()=>$('status').textContent='',2200)}
function iconFor(k){if(k==='steps')return'☊';if(k==='heart_rate')return'♡';if(k==='battery_pct')return'▰';if(k==='weather_temp')return'☀';if(k==='distance')return'⌁';return'◔'}
function debugSvg(){if(!$('debug').checked)return'';const s='stroke="#ff3b6b" stroke-width="1" fill="none" opacity=".75"';return'<g>'+['<circle cx="'+layout.circle.cx+'" cy="'+layout.circle.cy+'" r="'+layout.circle.r+'" '+s+'/>','<rect x="46" y="119" width="238" height="84" '+s+'/>','<rect x="48" y="208" width="142" height="34" '+s+'/>','<rect x="50" y="252" width="315" height="105" '+s+'/>','<line x1="208" y1="24" x2="208" y2="392" '+s+'/>','<line x1="24" y1="208" x2="392" y2="208" '+s+'/>'].join('')+'</g>'}
function watch(c,size){const accent=pal[c.accent]||pal.white,barc=pal[c.barColor]||accent,sub='#eef4ff',faint='#a5adbd',green=pal.green;const l=layout;return'<svg class="watch" viewBox="0 0 416 416" width="'+size+'" height="'+size+'">'
+'<defs><radialGradient id="dial" cx="44%" cy="42%"><stop offset="0" stop-color="#070707"/><stop offset="1" stop-color="#000"/></radialGradient></defs>'
+'<circle cx="'+l.outer.cx+'" cy="'+l.outer.cy+'" r="'+l.outer.r+'" fill="#05070d"/><circle cx="'+l.dial.cx+'" cy="'+l.dial.cy+'" r="'+l.dial.r+'" fill="url(#dial)"/>'
+'<path d="M83 52 A178 178 0 0 1 341 350" stroke="rgba(255,255,255,.08)" stroke-width="4" fill="none"/>'
+'<path d="M82 355 A177 177 0 0 1 55 91" stroke="rgba(255,255,255,.05)" stroke-width="2" fill="none"/>'
+'<g><text x="'+l.topMeta.x+'" y="'+l.topMeta.y+'" fill="'+sub+'" font-size="22" font-weight="800">'+(vals[c.topView]||'--')+'</text><rect x="211" y="23" width="30" height="13" rx="2" fill="none" stroke="'+faint+'"/><rect x="215" y="26" width="19" height="7" rx="1" fill="'+green+'"/><text x="'+l.topMeta.x+'" y="58" fill="'+sub+'" font-size="22" font-weight="800">'+(vals[c.secondView]||'--')+'</text><line x1="116" y1="'+l.topMeta.lineY+'" x2="215" y2="'+l.topMeta.lineY+'" stroke="rgba(255,255,255,.35)"/></g>'
+'<text x="84" y="91" fill="'+faint+'" font-size="20">'+iconFor(c.topView)+'</text><text x="108" y="108" fill="'+sub+'" font-size="24" font-weight="800">'+(vals.steps||'12456')+'</text><text x="334" y="112" fill="'+faint+'" font-size="17">✷</text>'
+'<circle cx="'+l.circle.cx+'" cy="'+l.circle.cy+'" r="'+l.circle.r+'" fill="#101319" stroke="rgba(255,255,255,.22)" stroke-width="3"/><text x="'+l.circle.cx+'" y="'+l.circle.labelY+'" text-anchor="middle" fill="'+faint+'" font-size="15">'+(labels[c.circleData]||'Metric').replace('Heart Rate','♡').replace('Battery %','BAT')+'</text><text x="'+l.circle.cx+'" y="'+l.circle.valueY+'" text-anchor="middle" fill="'+sub+'" font-size="42" font-weight="900">'+(vals[c.circleData]||'--')+'</text>'
+'<text x="'+l.time.x+'" y="'+l.time.y+'" fill="'+accent+'" font-size="'+l.time.font+'" font-weight="900" letter-spacing="-4">02:34</text><text x="'+l.time.secX+'" y="'+l.time.secY+'" fill="'+sub+'" font-size="'+l.time.secFont+'" font-weight="900">56</text>'
+'<text x="'+l.third.x+'" y="'+l.third.y+'" fill="'+sub+'" font-size="'+l.third.font+'" font-weight="800">'+(vals[c.thirdView]||'--')+'</text><text x="323" y="226" fill="'+sub+'" font-size="26" font-weight="800">20</text><text x="324" y="252" fill="'+faint+'" font-size="16">▱</text>'
+'<g><text x="178" y="276" fill="'+accent+'" font-size="22">☀</text><text x="202" y="281" text-anchor="middle" fill="'+sub+'" font-size="22" font-weight="800">17°C</text><text x="164" y="304" fill="'+faint+'" font-size="13">'+vals.sunrise+'</text><text x="218" y="304" fill="'+faint+'" font-size="13">'+vals.sunset+'</text><text x="96" y="300" fill="'+sub+'" font-size="16" font-weight="800">14%</text><text x="82" y="322" fill="'+faint+'" font-size="13">62%</text><text x="280" y="300" fill="'+sub+'" font-size="14" font-weight="800">NNW</text><text x="279" y="322" fill="'+sub+'" font-size="14" font-weight="800">0.5</text><rect x="'+l.bar.x+'" y="'+l.bar.y+'" width="'+l.bar.w+'" height="'+l.bar.h+'" rx="5" fill="rgba(255,255,255,.14)"/><rect x="'+l.bar.x+'" y="'+l.bar.y+'" width="65" height="'+l.bar.h+'" rx="5" fill="'+barc+'"/></g>'
+debugSvg()+'</svg>'}
init();
</script>
</body></html>
