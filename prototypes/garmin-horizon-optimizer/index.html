<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Horizon 表盘配置推荐器</title><style>:root{--bg:#080d18;--panel:#111936;--panel2:#0c1329;--text:#eef4ff;--muted:#99a9cd;--line:#26345e;--blue:#6aa7ff;--cyan:#55f0e7;--good:#85ff93;--warn:#ffd36a}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 20% 0,#16214a 0,#080d18 42%,#060914 100%);color:var(--text)}button,input,select,textarea{font:inherit}.app{max-width:1420px;margin:0 auto;padding:22px}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:stretch}.card{background:rgba(17,25,54,.84);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.24)}.intro{padding:24px}.ey{color:var(--cyan);font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin:0 0 10px}h1{font-size:34px;margin:0 0 10px;line-height:1.15}.intro p{color:var(--muted);line-height:1.65;margin:0;max-width:820px}.goal{padding:20px}.goal h2,.panel h2{font-size:17px;margin:0 0 14px}.chips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.chip{border:1px solid var(--line);background:#0c1329;color:var(--text);padding:12px;border-radius:16px;text-align:left;cursor:pointer}.chip b{display:block;font-size:14px;margin-bottom:4px}.chip span{font-size:12px;color:var(--muted)}.chip.active{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(85,240,231,.16) inset;background:#0f1b36}.main{display:grid;grid-template-columns:340px minmax(0,1fr) 360px;gap:16px;margin-top:16px}.panel{padding:18px}.watchbox{display:flex;align-items:center;justify-content:center;min-height:360px;background:linear-gradient(180deg,#0c1329,#080d18);border:1px solid var(--line);border-radius:22px}.preview-panel{padding:18px}.preview-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.score{font-size:44px;font-weight:900;line-height:1}.score small{font-size:13px;color:var(--muted);font-weight:600;display:block;margin-top:4px}.preset-title{margin:0 0 6px;font-size:22px}.desc{margin:0;color:var(--muted);line-height:1.55}.metrics{display:grid;gap:9px;margin-top:14px}.barrow{display:grid;grid-template-columns:82px 1fr 36px;gap:8px;align-items:center;font-size:12px;color:var(--muted)}.bar{height:10px;border-radius:999px;background:#0a1126;overflow:hidden;border:1px solid #24345f}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue))}.section{margin-top:16px}.field-grid{display:grid;gap:8px}.field{display:flex;justify-content:space-between;gap:12px;background:#0c1329;border:1px solid #24345f;border-radius:13px;padding:10px 12px;font-size:13px}.field span{color:var(--muted)}.reason{background:#0c1329;border:1px solid #24345f;border-radius:15px;padding:13px;color:#dce6ff;font-size:13px;line-height:1.7}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.btn{border:none;border-radius:13px;padding:11px 14px;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--blue),#7b61ff);color:white}.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}.ok{min-height:18px;margin-top:8px;color:var(--good);font-size:12px}.alts{display:grid;gap:10px}.alt{display:grid;grid-template-columns:96px 1fr;gap:10px;align-items:center;background:#0c1329;border:1px solid #24345f;border-radius:16px;padding:10px;cursor:pointer}.alt.active{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(85,240,231,.12) inset}.alt h3{margin:0 0 5px;font-size:14px}.alt p{margin:0;color:var(--muted);font-size:12px;line-height:1.4}.pill{display:inline-block;margin-top:7px;color:#cde0ff;background:#111d3c;border:1px solid #314476;border-radius:999px;padding:3px 8px;font-size:11px}.control label{display:block;color:var(--muted);font-size:12px;margin:12px 0 6px}select,textarea{width:100%;border:1px solid var(--line);background:#0c1329;color:var(--text);border-radius:13px;padding:10px 12px}textarea{min-height:180px;resize:vertical;font-size:12px;line-height:1.45}details{margin-top:14px}summary{cursor:pointer;color:#cbd9ff;font-weight:700}.device{display:grid;grid-template-columns:1fr 1fr;gap:10px}.watch{filter:drop-shadow(0 16px 28px rgba(0,0,0,.38))}@media(max-width:1100px){.hero,.main{grid-template-columns:1fr}.watchbox{min-height:300px}}@media(max-width:640px){.app{padding:14px}.chips,.device{grid-template-columns:1fr}.alt{grid-template-columns:80px 1fr}.watchbox svg{width:280px;height:280px}}</style></head><body><div class="app"><section class="hero"><div class="card intro"><p class="ey">Horizon · Garmin Forerunner 265</p><h1>先把这个表盘调到你满意</h1><p>这个版本把复杂 schema 收起来，改成普通用户视角：先选目标，再看推荐配置、预览效果、取舍解释和手动设置步骤。现在不追求通用平台，只打磨 Horizon 这一只表盘。</p></div><div class="card goal"><h2>你这次想优化什么？</h2><div id="goals" class="chips"></div></div></section><main class="main"><aside class="card panel control"><h2>偏好</h2><div class="device"><label>设备<select id="device"><option>Forerunner 265</option><option>Venu 3</option><option>Fenix/Epix</option></select></label><label>屏幕习惯<select id="aod"><option value="normal">日常抬腕</option><option value="aod">常亮/AOD</option></select></label></div><label>时间颜色倾向<select id="accent"><option value="cyan">青色/科技感</option><option value="white">白色/最高可读性</option><option value="green">绿色/运动感</option><option value="orange">橙色/高对比</option></select></label><label>信息密度<select id="density"><option value="balanced">平衡</option><option value="minimal">偏简洁</option><option value="data">偏数据流</option></select></label><details><summary>高级：当前 Horizon schema</summary><textarea id="schema"></textarea></details><div class="actions"><button class="btn ghost" id="regen">重新生成</button><button class="btn ghost" id="copySchema">复制 schema</button></div></aside><section class="card preview-panel"><div class="preview-top"><div><h2 class="preset-title" id="title">推荐配置</h2><p class="desc" id="desc">-</p></div><div class="score"><span id="score">-</span><small>综合分</small></div></div><div class="watchbox" id="watch"></div><div class="metrics" id="metrics"></div></section><aside class="card panel"><h2>设置与取舍</h2><div class="field-grid" id="fields"></div><div class="section reason" id="reason"></div><div class="actions"><button class="btn primary" id="copySteps">复制手动设置步骤</button><button class="btn ghost" id="copyJson">复制配置 JSON</button></div><div id="status" class="ok"></div></aside></main><section class="card panel section"><h2>可选方案对比</h2><div id="alts" class="alts"></div></section></div><script>const $=id=>document.getElementById(id);const labels={battery_pct:'Battery %',date1:'Date 1',heart_rate:'Heart Rate',steps:'Steps',weather_temp:'Weather',distance:'Distance',active_minutes_week:'Active Minutes',stress:'Stress',body_battery:'Body Battery',altitude:'Altitude',calories_active:'Active Calories',floors_climbed:'Floors',oxygen:'Oxygen',sunrise:'Sunrise',sunset:'Sunset'};const vals={battery_pct:'75%',date1:'Jun 13',heart_rate:'162',steps:'12456',weather_temp:'17°C',distance:'10.0km',active_minutes_week:'256',stress:'56',body_battery:'62',altitude:'58m',calories_active:'256',floors_climbed:'12',oxygen:'97',sunrise:'05:22',sunset:'19:08'};const pal={black:'#050607',cyan:'#21dfd4',white:'#f4f7ff',green:'#60ff7f',orange:'#ff9f1a',blue:'#4ab8ff',grey:'#7e8796',pink:'#ff5db3',yellow:'#ffe34d'};const schema={topView:['battery_pct','date1','heart_rate','steps','weather_temp','distance'],secondView:['active_minutes_week','stress','body_battery','altitude','calories_active','floors_climbed'],thirdView:['steps','distance','weather_temp','sunrise','sunset','body_battery'],secondBar:['stress','active_minutes_week','body_battery','battery_pct','oxygen','altitude'],circleData:['heart_rate','battery_pct','stress','body_battery','oxygen'],colors:['cyan','white','green','orange']};const goals={daily:{title:'日常清晰版',desc:'优先可读性、电量、日期和天气。适合每天戴，不需要把所有数据都塞满。',seed:{topView:'battery_pct',secondView:'body_battery',thirdView:'weather_temp',secondBar:'stress',circleData:'heart_rate',bg:'black'},w:{read:32,fit:25,amoled:20,density:12,style:11}},run:{title:'跑步训练版',desc:'心率和距离优先，同时保留电量。适合运动前快速确认关键数据。',seed:{topView:'battery_pct',secondView:'active_minutes_week',thirdView:'distance',secondBar:'heart_rate',circleData:'heart_rate',bg:'black'},w:{read:24,fit:34,amoled:16,density:13,style:13}},night:{title:'夜间省电版',desc:'黑底、低刺激、少字段。适合 AMOLED 和夜间看表，牺牲一部分数据密度。',seed:{topView:'date1',secondView:'body_battery',thirdView:'weather_temp',secondBar:'battery_pct',circleData:'battery_pct',bg:'black'},w:{read:28,fit:22,amoled:34,density:8,style:8}},data:{title:'数据密集版',desc:'尽可能多放信息，适合白天查看。可读性和清爽度会略下降。',seed:{topView:'steps',secondView:'active_minutes_week',thirdView:'distance',secondBar:'stress',circleData:'heart_rate',bg:'black'},w:{read:18,fit:28,amoled:12,density:30,style:12}}};let goal='daily',list=[],sel=null;function init(){Object.entries(goals).forEach(([k,g])=>{let b=document.createElement('button');b.className='chip';b.dataset.k=k;b.innerHTML='<b>'+g.title+'</b><span>'+g.desc.slice(0,28)+'...</span>';b.onclick=()=>{goal=k;gen()};$('goals').appendChild(b)});$('schema').value=JSON.stringify(schema,null,2);['device','aod','accent','density'].forEach(id=>$(id).onchange=gen);$('regen').onclick=gen;$('copySchema').onclick=()=>copy($('schema').value,'schema 已复制');$('copySteps').onclick=()=>copy(steps(sel),'手动设置步骤已复制');$('copyJson').onclick=()=>copy(JSON.stringify(sel,null,2),'配置 JSON 已复制');gen()}function variants(seed){const acc=$('accent').value,d=$('density').value;let base={...seed,accent:acc,timeBg:'black',circleBg:'black',barColor:acc};let arr=[base,{...base,thirdView:'distance'},{...base,thirdView:'weather_temp'},{...base,topView:'date1'},{...base,topView:'battery_pct'},{...base,secondView:'stress'},{...base,secondView:'body_battery'},{...base,circleData:'battery_pct'},{...base,circleData:'heart_rate'},{...base,barColor:'orange'},{...base,accent:'white'},{...base,accent:'green'}];if(d==='minimal')arr=arr.map(x=>({...x,secondView:'body_battery',secondBar:'battery_pct'}));if(d==='data')arr=arr.concat([{...base,topView:'steps',secondView:'active_minutes_week',thirdView:'distance',secondBar:'stress',circleData:'heart_rate'},{...base,topView:'weather_temp',secondView:'altitude',thirdView:'distance',secondBar:'oxygen',circleData:'heart_rate'}]);return arr.map((x,i)=>({...x,id:i+1,title:i===0?'推荐主方案':'备选方案 '+i}))}function score(c){let g=goals[goal],fit=60,read=78,amoled=88,dens=$('density').value==='data'?88:$('density').value==='minimal'?62:75,style=82;if(c.bg==='black')amoled+=8;if(c.accent==='white')read+=8;if(c.accent==='orange')read+=3;if(['heart_rate','distance'].includes(c.thirdView)&&goal==='run')fit+=18;if(c.circleData==='heart_rate'&&goal==='run')fit+=16;if(c.circleData==='battery_pct'&&goal==='night')fit+=14;if(c.topView==='battery_pct'&&goal==='daily')fit+=10;if(c.thirdView==='weather_temp'&&goal==='daily')fit+=8;if(c.secondView==='body_battery')fit+=6;if($('aod').value==='aod'){amoled+=6;if(c.accent==='orange'||c.accent==='white')read+=2}if(c.topView===c.circleData||c.thirdView===c.secondBar)dens-=8;read=Math.min(100,read);fit=Math.min(100,fit);amoled=Math.min(100,amoled);dens=Math.max(45,Math.min(100,dens));let total=Math.round((read*g.w.read+fit*g.w.fit+amoled*g.w.amoled+dens*g.w.density+style*g.w.style)/100);return{total,read,fit,amoled,dens,style}}function gen(){document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.k===goal));let g=goals[goal];list=variants(g.seed).map(c=>({...c,score:score(c)})).sort((a,b)=>b.score.total-a.score.total);sel=list[0];render()}function render(){let g=goals[goal];$('title').textContent=g.title;$('desc').textContent=g.desc;$('score').textContent=sel.score.total;$('watch').innerHTML=watch(sel,330);$('metrics').innerHTML=bar('可读性',sel.score.read)+bar('场景匹配',sel.score.fit)+bar('AMOLED',sel.score.amoled)+bar('信息密度',sel.score.dens)+bar('Horizon 感',sel.score.style);$('fields').innerHTML=field('Top View',labels[sel.topView])+field('Second View',labels[sel.secondView])+field('Second Bar',labels[sel.secondBar])+field('Third View',labels[sel.thirdView])+field('Circle Data',labels[sel.circleData])+field('Background','Black')+field('Accent',sel.accent);$('reason').innerHTML=reason(sel).join('<br>');$('alts').innerHTML=list.slice(0,8).map(c=>'<div class="alt '+(c.id===sel.id?'active':'')+'" data-id="'+c.id+'"><div>'+watch(c,82)+'</div><div><h3>'+c.title+' · '+c.score.total+' 分</h3><p>Top '+labels[c.topView]+' · Circle '+labels[c.circleData]+' · Bottom '+labels[c.thirdView]+'</p><span class="pill">'+trade(c)+'</span></div></div>').join('');document.querySelectorAll('.alt').forEach(e=>e.onclick=()=>{sel=list.find(x=>x.id==e.dataset.id);render();window.scrollTo({top:0,behavior:'smooth'})})}function field(k,v){return'<div class="field"><span>'+k+'</span><b>'+v+'</b></div>'}function bar(k,v){return'<div class="barrow"><span>'+k+'</span><div class="bar"><i style="width:'+v+'%"></i></div><b>'+v+'</b></div>'}function trade(c){if(goal==='night')return'更省电/少刺激';if(goal==='run')return'运动核心数据';if(goal==='data')return'字段更多';return'日常均衡'}function reason(c){let r=[];if(c.bg==='black')r.push('黑底是 Forerunner 265 AMOLED 的默认优选：省电、对比强、夜间不刺眼。');if(c.circleData==='heart_rate')r.push('右上圆形区放心率，保留 Horizon 最强的运动识别点。');if(c.circleData==='battery_pct')r.push('右上圆形区放电量，适合夜间/通勤时一眼确认续航。');if(c.topView==='battery_pct')r.push('顶部放电量，属于高频但低干扰信息。');if(c.thirdView==='distance')r.push('底部放距离，跑步场景比天气更有价值。');if(c.thirdView==='weather_temp')r.push('底部放天气，日常抬腕更实用。');r.push('当前推荐不是“最高信息量”，而是在可读性、场景匹配和 AMOLED 观感之间取平衡。');return r}function steps(c){return['Open Connect IQ Store → My Watch Faces → Horizon → Settings','Background Color: Black','Time background color: Black','Circle background color: Black','Top View: '+labels[c.topView],'Second View: '+labels[c.secondView],'Second Bar: '+labels[c.secondBar],'Third View: '+labels[c.thirdView],'Circle Data: '+labels[c.circleData],'Color Topview Icon / Secondview Icon: '+c.accent,'Color Second Bar: '+c.barColor].join('\n')}async function copy(t,msg){await navigator.clipboard.writeText(t);$('status').textContent=msg;setTimeout(()=>$('status').textContent='',2200)}function watch(c,size){const bg=pal.black,accent=pal[c.accent]||pal.cyan,barc=pal[c.barColor]||accent,sub='#eef4ff',faint='#8c98b8';return'<svg class="watch" viewBox="0 0 416 416" width="'+size+'" height="'+size+'"><circle cx="208" cy="208" r="196" fill="#02050a"/><circle cx="208" cy="208" r="184" fill="'+bg+'"/><path d="M96 44 A178 178 0 0 1 330 360" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3"/><circle cx="316" cy="108" r="60" fill="#101318" stroke="rgba(255,255,255,.12)"/><text x="316" y="92" text-anchor="middle" fill="'+faint+'" font-size="15">'+labels[c.circleData].replace(' ','')+'</text><text x="316" y="130" text-anchor="middle" fill="'+sub+'" font-size="43" font-weight="800">'+(vals[c.circleData]||'--')+'</text><g transform="translate(64 50)"><text x="0" y="0" fill="'+accent+'" font-size="18">◔</text><text x="24" y="5" fill="'+sub+'" font-size="20" font-weight="700">'+(vals[c.topView]||'--')+'</text><line x1="0" y1="18" x2="112" y2="18" stroke="rgba(255,255,255,.08)"/><text x="24" y="40" fill="'+sub+'" font-size="17">'+(vals[c.secondView]||'--')+'</text></g><rect x="58" y="156" width="209" height="92" rx="17" fill="#090d13" stroke="rgba(255,255,255,.10)"/><text x="70" y="226" fill="'+accent+'" font-size="86" font-weight="900">02:34</text><text x="272" y="226" fill="'+sub+'" font-size="31" font-weight="800">56</text><text x="58" y="278" fill="'+sub+'" font-size="27" font-weight="700">'+(vals[c.thirdView]||'--')+'</text><g transform="translate(56 316)"><text x="0" y="0" fill="'+sub+'" font-size="18">☼ '+vals.weather_temp+'</text><text x="73" y="0" fill="'+faint+'" font-size="12">'+vals.sunrise+'</text><text x="73" y="17" fill="'+faint+'" font-size="12">'+vals.sunset+'</text><text x="128" y="9" fill="'+sub+'" font-size="23" font-weight="700">'+(vals[c.secondBar]||'--')+'</text><rect x="0" y="28" width="132" height="12" rx="6" fill="rgba(255,255,255,.1)"/><rect x="0" y="28" width="94" height="12" rx="6" fill="'+barc+'"/></g></svg>'}init();function init(){document.addEventListener('DOMContentLoaded',()=>{})}init=undefined;</script><script>('+function(){return 1}+')();</script><script>/* boot */(function(){document.querySelectorAll;})()</script><script>/* start */</script><script>setTimeout(()=>{if(window.__booted)return;window.__booted=true;},0);</script><script>document.addEventListener('DOMContentLoaded',()=>{});</script><script>/* run */</script><script>const boot=()=>{if(window.didBoot)return;window.didBoot=true;initApp&&initApp()};</script><script>/* compat */</script><script>function initApp(){}</script><script>/* actual */</script><script>setTimeout(()=>{try{if(!$('goals').children.length){Object.entries(goals).forEach(([k,g])=>{let b=document.createElement('button');b.className='chip';b.dataset.k=k;b.innerHTML='<b>'+g.title+'</b><span>'+g.desc.slice(0,28)+'...</span>';b.onclick=()=>{goal=k;gen()};$('goals').appendChild(b)});$('schema').value=JSON.stringify(schema,null,2);['device','aod','accent','density'].forEach(id=>$(id).onchange=gen);$('regen').onclick=gen;$('copySchema').onclick=()=>copy($('schema').value,'schema 已复制');gen()}}catch(e){document.body.insertAdjacentHTML('beforeend','<pre style="color:#fff">'+e.message+'</pre>')}},0)</script></body></html>
