<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Horizon 配置对比选择器</title>
<style>
:root{--bg:#08101f;--p:#0f1933;--p2:#0b1429;--line:#26365f;--t:#eef4ff;--m:#9eb0d7;--c:#34e2e2;--b:#6aa7ff}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at 18% 0,#17254f 0,#08101f 42%,#050915 100%);color:var(--t)}button,select,input{font:inherit}.app{max-width:1480px;margin:0 auto;padding:22px}.card{background:rgba(15,25,51,.88);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.24)}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-bottom:18px}.intro,.goal,.panel{padding:20px}.ey{margin:0 0 10px;color:var(--c);font-size:12px;letter-spacing:.14em;text-transform:uppercase}h1{margin:0 0 10px;font-size:34px;line-height:1.15}p{color:var(--m);line-height:1.65}.chips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.chip{border:1px solid var(--line);background:#111c39;color:var(--t);padding:12px;border-radius:16px;text-align:left;cursor:pointer}.chip b{display:block;margin-bottom:4px}.chip span{font-size:12px;color:var(--m)}.chip.active{border-color:var(--c);box-shadow:0 0 0 2px rgba(52,226,226,.16) inset;background:#10203d}.main{display:grid;grid-template-columns:320px minmax(0,1fr);gap:16px}.control label{display:block;color:var(--m);font-size:12px;margin:12px 0 6px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}select{width:100%;border:1px solid var(--line);background:var(--p2);color:var(--t);border-radius:13px;padding:10px 12px}.toggle{display:flex!important;align-items:center;gap:8px;color:#d8e3ff!important}.toggle input{width:auto}.btn,.smallbtn{border-radius:13px;font-weight:800;cursor:pointer}.btn{border:none;padding:11px 14px}.primary{background:linear-gradient(135deg,var(--b),#7b61ff);color:#fff}.ghost{background:transparent;color:var(--t);border:1px solid var(--line)}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.wrap{display:grid;gap:16px}.toolbar{display:flex;justify-content:space-between;gap:14px;padding:16px 18px}.meta{color:var(--m);font-size:13px;line-height:1.6}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;padding:0 18px 18px}.candidate{background:rgba(11,20,41,.95);border:1px solid #29416d;border-radius:18px;padding:14px;display:grid;gap:12px;cursor:pointer}.candidate.selected{border-color:var(--c);box-shadow:0 0 0 2px rgba(52,226,226,.14) inset}.head{display:flex;justify-content:space-between;gap:10px}.name{font-size:17px;font-weight:900}.sub{font-size:12px;color:var(--m);margin-top:2px}.score{font-size:28px;font-weight:900;line-height:1}.score small{display:block;color:var(--m);font-size:11px;font-weight:600;text-align:right}.watchbox{display:flex;align-items:center;justify-content:center;min-height:210px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0c152d,#08101f)}.badges{display:flex;flex-wrap:wrap;gap:6px}.badge{font-size:11px;padding:4px 8px;border-radius:999px;background:#101d3a;border:1px solid #314476;color:#d4e0ff}.metrics{display:grid;gap:8px}.metric{display:grid;grid-template-columns:56px 1fr 26px;gap:7px;align-items:center;font-size:12px;color:var(--m)}.bar{height:8px;border-radius:999px;background:#08101f;border:1px solid #223154;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--c),var(--b))}.diff{background:#0e1833;border:1px solid #24345f;border-radius:14px;padding:10px 12px;font-size:12px;line-height:1.55}.diff b{display:block;margin-bottom:4px}.diff div{color:var(--m)}.card-actions{display:flex;justify-content:space-between;gap:10px}.smallbtn{padding:8px 10px;border:1px solid var(--line);background:transparent;color:var(--t);font-size:12px}.smallbtn.filled{background:#15284d;border-color:#2f5a8f}.compare{padding:18px}.empty{color:var(--m);font-size:14px;line-height:1.7}.cg{display:grid;grid-template-columns:180px repeat(3,1fr);gap:10px;align-items:start}.lab,.cell{background:var(--p2);border:1px solid #24345f;border-radius:14px;padding:10px 12px}.lab{color:var(--m);font-weight:700}.cell strong{display:block;margin-bottom:4px}.diff-only .same{display:none}@media(max-width:1200px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.cg{grid-template-columns:140px repeat(3,1fr)}}@media(max-width:980px){.hero,.main{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.cg{grid-template-columns:1fr}.chips,.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<section class="hero"><div class="card intro"><p class="ey">Horizon · compare mode v2.1</p><h1>候选不只排序，还要“有差别”</h1><p>按结构和取舍聚类，为每张方案卡给出明确名称，并展示它相对第一名的关键差异。这里的“颜色倾向”只是产品输入，最终会映射到 Horizon 真实设置项：Color Topview Icon / Color Secondview Icon / Color Second Bar。</p></div><div class="card goal"><h2>目标场景</h2><div id="goals" class="chips"></div></div></section>
<section class="main"><aside class="card panel control"><h2>偏好</h2><div class="grid2"><label>设备<select id="device"><option>Forerunner 265</option><option>Venu 3</option><option>Fenix / Epix</option></select></label><label>屏幕习惯<select id="aod"><option value="normal">日常抬腕</option><option value="aod">常亮 / AOD</option></select></label></div><label>颜色倾向<select id="accent"><option value="cyan">青色 / 科技感</option><option value="white">白色 / 最接近截图</option><option value="green">绿色 / 运动感</option><option value="orange">橙色 / 高对比</option></select></label><label>信息密度<select id="density"><option value="balanced">平衡</option><option value="minimal">偏简洁</option><option value="data">偏数据流</option></select></label><label class="toggle"><input id="diffOnly" type="checkbox" />对比时只看差异字段</label><div class="actions"><button class="btn ghost" id="regen">重新生成候选</button><button class="btn primary" id="copyBest">复制第一名设置步骤</button></div></aside><section class="wrap"><div class="card"><div class="toolbar"><div><h2 style="margin:0 0 6px;font-size:18px">候选统一对比</h2><div class="meta" id="toolbarMeta">展示结构化去重后的 Top 候选。</div></div><div class="meta" id="selectedCount">已选 0 / 3</div></div><div id="grid" class="grid"></div></div><div class="card compare"><h2>差异对比</h2><div id="compareContent" class="empty">请选择 2~3 个候选方案进行横向比较。</div></div></section></section>
</div>
<script>
const $=id=>document.getElementById(id);
const labels={battery_pct:'Battery %',date1:'Date 1',heart_rate:'Heart Rate',steps:'Steps',weather_temp:'Weather',distance:'Distance',active_minutes_week:'Active Minutes',stress:'Stress',body_battery:'Body Battery',altitude:'Altitude',oxygen:'Oxygen'};
const vals={battery_pct:'75%',date1:'Jun 13',heart_rate:'162',steps:'12456',weather_temp:'17°C',distance:'10.0km',active_minutes_week:'256',stress:'56',body_battery:'62',altitude:'58m',oxygen:'97'};
const pal={cyan:'#25e3e3',white:'#eef4ff',green:'#69ff83',orange:'#ff9f1a'};
const layout={outer:{cx:208,cy:208,r:188},dial:{cx:208,cy:208,r:178},top:{x:150,y:36,subY:58,batX:212,batY:23},steps:{iconX:83,iconY:92,valX:109,valY:108},circle:{cx:288,cy:82,r:48,labelY:68,valueY:108},time:{x:48,y:191,font:78,width:220,secX:286,secY:190,secFont:31},third:{x:55,y:226,font:23},weather:{iconX:178,tempX:214,tempY:281,sunriseX:164,sunsetX:218,timeY:304},bottom:{leftX:88,rightX:282,y1:300,y2:322},bar:{x:166,y:347,w:92,h:10}};
const goals={daily:{title:'日常清晰版',desc:'更均衡，日常抬腕更舒服。',seed:{topView:'battery_pct',secondView:'active_minutes_week',thirdView:'distance',secondBar:'stress',circleData:'heart_rate'},w:{read:32,fit:25,amoled:20,density:12,style:11}},run:{title:'跑步训练版',desc:'心率和距离优先。',seed:{topView:'battery_pct',secondView:'body_battery',thirdView:'distance',secondBar:'heart_rate',circleData:'heart_rate'},w:{read:24,fit:34,amoled:16,density:13,style:13}},night:{title:'夜间省电版',desc:'黑底少字段，低刺激。',seed:{topView:'battery_pct',secondView:'body_battery',thirdView:'date1',secondBar:'battery_pct',circleData:'battery_pct'},w:{read:28,fit:22,amoled:34,density:8,style:8}},data:{title:'数据密集版',desc:'尽量多放信息。',seed:{topView:'steps',secondView:'active_minutes_week',thirdView:'distance',secondBar:'stress',circleData:'heart_rate'},w:{read:18,fit:28,amoled:12,density:30,style:12}}};
let goal='daily',candidates=[],selected=[];
function init(){Object.entries(goals).forEach(([k,g])=>{let b=document.createElement('button');b.className='chip';b.dataset.k=k;b.innerHTML=`<b>${g.title}</b><span>${g.desc}</span>`;b.onclick=()=>{goal=k;generate()};$('goals').appendChild(b)});['device','aod','accent','density','diffOnly'].forEach(id=>$(id).addEventListener('change',()=>id==='diffOnly'?renderCompare():generate()));$('regen').onclick=generate;$('copyBest').onclick=()=>navigator.clipboard.writeText(steps(candidates[0]||{}));generate()}
function rawVariants(seed){const acc=$('accent').value,base={...seed,accent:acc,barColor:acc};return [{...base,variant:'base'},{...base,accent:'white',barColor:'white',variant:'read'},{...base,accent:'green',barColor:'green',secondBar:'heart_rate',variant:'sport'},{...base,circleData:'battery_pct',thirdView:'date1',accent:'white',barColor:'white',secondBar:'battery_pct',variant:'battery'},{...base,topView:'steps',secondView:'active_minutes_week',thirdView:'distance',variant:'steps'},{...base,secondView:'body_battery',thirdView:'distance',accent:'cyan',barColor:'cyan',variant:'body'},{...base,topView:'battery_pct',secondView:'altitude',thirdView:'distance',secondBar:'oxygen',accent:'orange',barColor:'orange',variant:'contrast'},{...base,topView:'battery_pct',secondView:'body_battery',thirdView:'date1',circleData:'heart_rate',accent:'white',barColor:'white',variant:'minimal'}]}
function score(c){const g=goals[goal];let read=80,fit=60,amoled=90,dens=$('density').value==='data'?88:$('density').value==='minimal'?62:75,style=88;if(c.accent==='white')read+=8;if(c.accent==='orange')read+=3;if(goal==='run'&&c.thirdView==='distance')fit+=18;if(goal==='run'&&c.circleData==='heart_rate')fit+=16;if(goal==='night'&&c.circleData==='battery_pct')fit+=14;if(goal==='daily'&&c.topView==='battery_pct')fit+=10;if(c.secondView==='body_battery')fit+=6;if($('aod').value==='aod')amoled+=6;if(c.topView==='steps')dens+=4;if(c.thirdView==='date1')dens-=8;if(c.circleData==='battery_pct')amoled+=2;read=Math.min(100,read);fit=Math.min(100,fit);amoled=Math.min(100,amoled);dens=Math.max(45,Math.min(100,dens));return{total:Math.round((read*g.w.read+fit*g.w.fit+amoled*g.w.amoled+dens*g.w.density+style*g.w.style)/100),read,fit,amoled,dens,style}}
function schemeName(c){if(c.circleData==='battery_pct')return'电量圆形版';if(c.accent==='white')return c.thirdView==='date1'?'白色日期版':'白色高可读版';if(c.accent==='green')return'绿色运动版';if(c.accent==='orange')return'高对比版';if(c.topView==='steps')return'步数强化版';if(c.secondView==='body_battery')return'身体电量版';return'日常均衡版'}
function signature(c){return[c.topView,c.secondView,c.thirdView,c.circleData,c.accent,c.barColor].join('|')}function diffSummary(c,l){if(!l||c.id===l.id)return['基准方案'];let d=[];if(c.accent!==l.accent)d.push(`图标色 ${l.accent} → ${c.accent}`);if(c.barColor!==l.barColor)d.push(`Second Bar 颜色 ${l.barColor} → ${c.barColor}`);if(c.circleData!==l.circleData)d.push(`圆形 ${labels[l.circleData]} → ${labels[c.circleData]}`);if(c.thirdView!==l.thirdView)d.push(`主字段 ${labels[l.thirdView]} → ${labels[c.thirdView]}`);if(c.secondView!==l.secondView)d.push(`第二字段 ${labels[l.secondView]} → ${labels[c.secondView]}`);if(c.topView!==l.topView)d.push(`顶部 ${labels[l.topView]} → ${labels[c.topView]}`);return d.slice(0,3)}
function generate(){document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.k===goal));let scored=rawVariants(goals[goal].seed).map((c,i)=>({...c,id:'cand'+(i+1),score:score(c)})).sort((a,b)=>b.score.total-a.score.total),u=[],seen=new Set();scored.forEach(c=>{let s=signature(c);if(!seen.has(s)){u.push(c);seen.add(s)}});candidates=u.slice(0,6).map((c,i)=>({...c,rank:i+1,name:schemeName(c)}));candidates=candidates.map(c=>({...c,diffs:diffSummary(c,candidates[0])}));selected=selected.filter(id=>candidates.some(c=>c.id===id));renderGrid();renderCompare();$('toolbarMeta').textContent=`当前目标：${goals[goal].title}。已按结构去重，保留取舍明显不同的 Top ${candidates.length} 候选。`}
function renderGrid(){$('grid').innerHTML=candidates.map(card).join('');document.querySelectorAll('[data-select]').forEach(b=>b.onclick=e=>{e.stopPropagation();toggleSelect(b.dataset.select)});document.querySelectorAll('[data-detail]').forEach(b=>b.onclick=e=>{e.stopPropagation();selected=[b.dataset.detail];renderGrid();renderCompare()});document.querySelectorAll('.candidate').forEach(c=>c.onclick=()=>toggleSelect(c.dataset.id));$('selectedCount').textContent=`已选 ${selected.length} / 3`}
function toggleSelect(id){if(selected.includes(id))selected=selected.filter(x=>x!==id);else{if(selected.length>=3)selected.shift();selected.push(id)}renderGrid();renderCompare()}function mrow(n,v){return`<div class="metric"><span>${n}</span><div class="bar"><i style="width:${v}%"></i></div><b>${v}</b></div>`}
function card(c){let chosen=selected.includes(c.id),badges=[`Top ${labels[c.topView]}`,`Circle ${labels[c.circleData]}`,`Main ${labels[c.thirdView]}`].map(x=>`<span class="badge">${x}</span>`).join(''),diff=c.diffs.map(x=>`<div>• ${x}</div>`).join('');return`<div class="candidate ${chosen?'selected':''}" data-id="${c.id}"><div class="head"><div><div class="name">${c.name}</div><div class="sub">${trade(c)} · 方案 ${c.rank}</div></div><div class="score">${c.score.total}<small>综合分</small></div></div><div class="watchbox">${watch(c,185)}</div><div class="badges">${badges}</div><div class="metrics">${mrow('可读',c.score.read)}${mrow('匹配',c.score.fit)}${mrow('AMOLED',c.score.amoled)}${mrow('密度',c.score.dens)}</div><div class="diff"><b>${c.rank===1?'当前基准':'相对第一名的主要差异'}</b>${diff}</div><div class="card-actions"><button class="smallbtn ${chosen?'filled':''}" data-select="${c.id}">${chosen?'已加入对比':'加入对比'}</button><button class="smallbtn" data-detail="${c.id}">单看详情</button></div></div>`}
function trade(c){if(c.circleData==='battery_pct')return'更省电/更直接';if(c.accent==='white')return'高可读 / 偏克制';if(c.accent==='green')return'运动感更强';if(c.topView==='steps')return'更偏数据流';return goal==='run'?'运动核心数据':goal==='night'?'夜间低刺激':'日常均衡'}
function renderCompare(){let box=$('compareContent');if(!selected.length){box.className='empty';box.innerHTML='请选择 2~3 个候选方案进行横向比较。';return}let sel=selected.map(find);if(sel.length===1){let c=sel[0];box.className='';box.innerHTML=`<div class="cg"><div class="lab">预览</div><div class="cell" style="grid-column:span 3;display:flex;gap:18px;flex-wrap:wrap;align-items:center"><div>${watch(c,220)}</div><div><strong>${c.name}</strong><div>Top: ${labels[c.topView]}</div><div>Second: ${labels[c.secondView]}</div><div>Bar: ${labels[c.secondBar]}</div><div>Main: ${labels[c.thirdView]}</div><div>Circle: ${labels[c.circleData]}</div><div>Color Topview Icon: ${c.accent}</div><div>Color Secondview Icon: ${c.accent}</div><div>Color Second Bar: ${c.barColor}</div></div></div></div>`;return}let rows=[['综合分',x=>x.score.total],['方案名',x=>x.name],['Top View',x=>labels[x.topView]],['Second View',x=>labels[x.secondView]],['Second Bar',x=>labels[x.secondBar]],['Third View',x=>labels[x.thirdView]],['Circle Data',x=>labels[x.circleData]],['Color Topview Icon',x=>x.accent],['Color Secondview Icon',x=>x.accent],['Color Second Bar',x=>x.barColor],['取舍',x=>trade(x)],['相对第一名差异',x=>x.diffs.join('<br>')]],diffOnly=$('diffOnly').checked,html=`<div class="cg ${diffOnly?'diff-only':''}"><div class="lab">方案</div>`+sel.map(c=>`<div class="cell"><strong>${c.name}</strong>${watch(c,120)}</div>`).join('');rows.forEach(([n,g])=>{let vs=sel.map(g),same=vs.every(v=>v===vs[0]);html+=`<div class="lab ${same?'same':''}">${n}</div>`+vs.map(v=>`<div class="cell ${same?'same':''}">${v}</div>`).join('')});html+='</div>';box.className='';box.innerHTML=html}
function find(id){return candidates.find(c=>c.id===id)}function steps(c){if(!c||!c.id)return'';return['Open Connect IQ Store → My Watch Faces → Horizon → Settings','Background Color: Black','Time background color: Black','Circle background color: Black','Top View: '+labels[c.topView],'Second View: '+labels[c.secondView],'Second Bar: '+labels[c.secondBar],'Third View: '+labels[c.thirdView],'Circle Data: '+labels[c.circleData],'Color Topview Icon: '+c.accent,'Color Secondview Icon: '+c.accent,'Color Second Bar: '+c.barColor].join('\n')}
function watch(c,size){let accent=pal[c.accent]||pal.cyan,sub='#eef4ff',faint='#a4adbe',green='#67ff81',l=layout,cl=c.circleData==='heart_rate'?'♡':c.circleData==='battery_pct'?'BAT':labels[c.circleData]||'Metric';return`<svg viewBox="0 0 416 416" width="${size}" height="${size}" style="filter:drop-shadow(0 16px 28px rgba(0,0,0,.38))"><defs><radialGradient id="dial" cx="44%" cy="42%"><stop offset="0" stop-color="#070707"/><stop offset="1" stop-color="#000"/></radialGradient></defs><circle cx="${l.outer.cx}" cy="${l.outer.cy}" r="${l.outer.r}" fill="#05070d"/><circle cx="${l.dial.cx}" cy="${l.dial.cy}" r="${l.dial.r}" fill="url(#dial)"/><path d="M83 52 A178 178 0 0 1 341 350" stroke="rgba(255,255,255,.08)" stroke-width="4" fill="none"/><text x="${l.top.x}" y="${l.top.y}" fill="${sub}" font-size="22" font-weight="800">${vals[c.topView]||'75%'}</text><rect x="${l.top.batX}" y="${l.top.batY}" width="30" height="13" rx="2" fill="none" stroke="${faint}"/><rect x="${l.top.batX+4}" y="${l.top.batY+3}" width="19" height="7" rx="1" fill="${green}"/><text x="${l.top.x}" y="${l.top.subY}" fill="${sub}" font-size="22" font-weight="800">${vals[c.secondView]||'62'}</text><line x1="116" y1="68" x2="214" y2="68" stroke="rgba(255,255,255,.35)"/><text x="${l.steps.iconX}" y="${l.steps.iconY}" fill="${faint}" font-size="20">⌁</text><text x="${l.steps.valX}" y="${l.steps.valY}" fill="${sub}" font-size="24" font-weight="800">12456</text><circle cx="${l.circle.cx}" cy="${l.circle.cy}" r="${l.circle.r}" fill="#101319" stroke="rgba(255,255,255,.22)" stroke-width="3"/><text x="${l.circle.cx}" y="${l.circle.labelY}" text-anchor="middle" fill="${faint}" font-size="15">${cl}</text><text x="${l.circle.cx}" y="${l.circle.valueY}" text-anchor="middle" fill="${sub}" font-size="42" font-weight="900">${vals[c.circleData]||'162'}</text><text x="${l.time.x}" y="${l.time.y}" fill="${accent}" font-size="${l.time.font}" font-weight="900" letter-spacing="-5" textLength="${l.time.width}" lengthAdjust="spacingAndGlyphs">02:34</text><text x="${l.time.secX}" y="${l.time.secY}" fill="${sub}" font-size="${l.time.secFont}" font-weight="900">56</text><text x="${l.third.x}" y="${l.third.y}" fill="${sub}" font-size="${l.third.font}" font-weight="800">${vals[c.thirdView]||'10.0km'}</text><text x="323" y="226" fill="${sub}" font-size="26" font-weight="800">20</text><text x="178" y="277" fill="#e6e766" font-size="24">☀</text><text x="214" y="281" text-anchor="middle" fill="${sub}" font-size="22" font-weight="800">17°C</text><text x="164" y="304" fill="${faint}" font-size="13">05:22</text><text x="218" y="304" fill="${faint}" font-size="13">19:08</text><text x="88" y="300" fill="${sub}" font-size="16" font-weight="800">14%</text><text x="74" y="322" fill="${faint}" font-size="13">62%</text><text x="282" y="300" fill="${sub}" font-size="14" font-weight="800">NNW</text><text x="282" y="322" fill="${sub}" font-size="14" font-weight="800">0.5</text><rect x="${l.bar.x}" y="${l.bar.y}" width="${l.bar.w}" height="${l.bar.h}" rx="5" fill="rgba(255,255,255,.14)"/><rect x="${l.bar.x}" y="${l.bar.y}" width="65" height="${l.bar.h}" rx="5" fill="${accent}"/></svg>`}
init();
</script></body></html>
