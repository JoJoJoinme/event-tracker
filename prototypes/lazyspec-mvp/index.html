<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LazySpec MVP - AI 任务简报</title>
<style>
:root{--bg:#f5f3ef;--panel:rgba(255,255,255,.8);--text:#201f1d;--muted:#756f68;--border:#ded8ce;--accent:#2f5d50;--accent2:#e2eee9;--warn:#8a5b15;--warnbg:#fff4d8;--shadow:0 18px 60px rgba(48,41,32,.08);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at top left,#e4f0eb 0,transparent 34%),radial-gradient(circle at bottom right,#f2e1bf 0,transparent 30%),var(--bg)}.app{max-width:1440px;margin:0 auto;padding:28px}.top{display:flex;justify-content:space-between;gap:24px;align-items:flex-start;margin-bottom:20px}.eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:800}h1{margin:4px 0 0;font-size:clamp(24px,3vw,38px);line-height:1.14;max-width:880px}.pill,.badge{border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:999px;padding:8px 12px;font-size:13px;white-space:nowrap}.layout{display:grid;grid-template-columns:minmax(360px,.86fr) minmax(520px,1.14fr);gap:20px;align-items:start}.panel,.card{background:var(--panel);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}.left{padding:20px;position:sticky;top:20px}.head{display:flex;justify-content:space-between;gap:12px;align-items:baseline;margin-bottom:12px}.head h2,.result-head h2{margin:0}.head span{color:var(--muted);font-size:13px}textarea{width:100%;min-height:310px;resize:vertical;border:1px solid var(--border);border-radius:18px;padding:16px;font-size:16px;line-height:1.6;outline:none;background:rgba(255,255,255,.72);color:var(--text)}textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent2)}.controls{display:grid;gap:12px;margin:14px 0}label{font-size:13px;color:var(--muted);display:grid;gap:6px}select{border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.76);padding:11px 12px;font-size:14px;color:var(--text)}.buttons{display:flex;flex-wrap:wrap;gap:10px}button{border:1px solid var(--border);background:#fff;color:var(--text);border-radius:14px;padding:11px 14px;font-weight:700;cursor:pointer}button:hover{transform:translateY(-1px)}button.primary{background:var(--accent);border-color:var(--accent);color:white}.hint{margin-top:16px;padding:14px 16px;border:1px dashed var(--border);border-radius:18px;background:rgba(255,255,255,.46);color:var(--muted);line-height:1.55}.hint p{margin:6px 0 0}.right{min-height:720px}.summary{min-height:720px;padding:20px}.empty{min-height:660px;display:grid;place-content:center;text-align:center;color:var(--muted)}.result-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.goal{background:var(--accent2);border-radius:20px;padding:16px 18px;margin-bottom:16px}.goal .label{color:var(--accent);font-size:13px;font-weight:800}.goal p{margin:6px 0 0;line-height:1.55}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{padding:16px;box-shadow:none;background:rgba(255,255,255,.72)}.card h3{margin:0 0 10px;font-size:16px}.card ul{margin:0;padding-left:18px;color:#34312d;line-height:1.55}.card li+li{margin-top:6px}.attention{background:var(--warnbg);border-color:#efd59a}.attention h3{color:var(--warn)}.prompt{margin-top:14px}.prompt-head{display:flex;align-items:center;justify-content:space-between;gap:12px}pre{white-space:pre-wrap;word-break:break-word;margin:0;padding:14px;border-radius:16px;background:#191f1c;color:#f3f7f4;line-height:1.55;max-height:440px;overflow:auto}.next{margin-top:14px}.next p{margin:0;color:#34312d;line-height:1.6}.score{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.metric{padding:12px;border-radius:16px;background:#fff;border:1px solid var(--border)}.metric strong{display:block;font-size:22px;color:var(--accent)}.metric span{font-size:12px;color:var(--muted)}@media(max-width:980px){.app{padding:16px}.top,.layout,.grid,.score{grid-template-columns:1fr;display:grid}.left{position:static}.summary,.empty{min-height:420px}}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div>
    <div class="eyebrow">LazySpec MVP</div>
    <h1>把模糊需求变成 AI Coding Agent 可执行的任务简报</h1>
  </div>
  <div class="pill">静态原型 / 无需 API Key</div>
</header>
<main class="layout">
<section class="left panel">
  <div class="head"><h2>原始需求</h2><span>自然说，不需要写 PRD</span></div>
  <textarea id="input" placeholder="例如：我想给后台加一个订单导出功能，支持按当前筛选条件导出 CSV，最好不要影响现有列表查询。"></textarea>
  <div class="controls">
    <label>流程重量<select id="mode"><option>三行需求卡</option><option selected>轻量 Spec</option><option>完整 SDD</option></select></label>
    <label>用户类型<select id="audience"><option selected>正在使用 AI coding agent 的程序员/独立开发者</option><option>小团队技术负责人</option><option>产品经理/业务方</option><option>后端工程师</option></select></label>
  </div>
  <div class="buttons">
    <button class="primary" id="run">生成任务简报</button>
    <button id="s1">登录样例</button>
    <button id="s2">导出样例</button>
    <button id="s3">搜索样例</button>
    <button id="clear">清空</button>
  </div>
  <div class="hint"><strong>设计原则：</strong><p>不是完整 SDD，而是 Lazy Spec：先暴露默认假设，只追问影响实现方向的问题，然后生成可复制给 Cursor / Claude Code / Codex 的 Agent Prompt。</p></div>
</section>
<section class="right">
  <div class="summary panel" id="out"><div class="empty"><h2>右侧会生成需求卡</h2><p>包括目标、默认假设、关键追问、验收标准、返工风险和 Agent Prompt。</p></div></div>
</section>
</main>
</div>
<script>
const $=s=>document.querySelector(s);
const input=$("#input"),out=$("#out");
const samples={
login:"我想做一个用户登录注册功能，支持邮箱和密码登录。后面可能会接 Google 登录，但现在先想用 AI 帮我把基础功能做出来。",
export:"我想给后台订单列表加一个导出功能，按当前筛选条件导出 CSV。不要影响现有列表查询，最好只让管理员能导出。",
search:"我想给用户列表加一个搜索功能，可以按用户名和邮箱搜索，最好不要把现有分页搞坏。"
};
$("#s1").onclick=()=>input.value=samples.login;
$("#s2").onclick=()=>input.value=samples.export;
$("#s3").onclick=()=>input.value=samples.search;
$("#clear").onclick=()=>{input.value="";out.innerHTML='<div class="empty"><h2>右侧会生成需求卡</h2><p>包括目标、默认假设、关键追问、验收标准、返工风险和 Agent Prompt。</p></div>'};
input.value=samples.export;

function analyze(t){
 const login=/登录|注册|auth|jwt|邮箱|用户/.test(t);
 const exp=/导出|csv|excel|订单|报表/.test(t);
 const search=/搜索|筛选|查询|过滤/.test(t);
 if(login)return {
 title:"邮箱登录/注册功能",complexity:"中",mode:"轻量 Spec",scores:[72,66,58,74],
 goal:"实现一个最小可用的邮箱 + 密码登录注册能力，并整理成适合交给 coding agent 执行的任务说明。",
 scope:["用户注册","用户登录","登出","登录态保存","基础错误处理"],
 nonGoals:["暂不做 Google/GitHub 第三方登录","暂不做复杂风控","暂不做多租户权限"],
 assumptions:["使用邮箱 + 密码作为主要登录方式","登录态使用 JWT","密码需要哈希存储","先做 MVP，不做邮箱验证码","错误信息不暴露过多安全细节"],
 questions:["是否必须做邮箱验证？","JWT 过期时间希望是多少？","是否已有用户表和鉴权中间件？","是否需要忘记密码流程？","是否需要限制登录失败次数？"],
 acceptance:["新用户可以用邮箱和密码注册","已注册用户可以登录并获得 token","错误密码不能登录","登出后前端清除登录态","未登录用户访问受保护接口会被拒绝"],
 risks:["是否需要邮箱验证会影响数据模型和流程","JWT/session 选择会影响后端架构","忘记密码和限流如果后补，可能返工"],
 prompt:`请在现有项目中实现邮箱 + 密码登录注册 MVP。

目标：
- 支持用户注册、登录、登出。
- 登录成功后返回并保存登录态。
- 提供基础错误处理和受保护接口校验。

范围：
- 注册接口
- 登录接口
- 登出/清除登录态
- 密码哈希
- 鉴权中间件
- 最小前端表单，如项目有前端

非目标：
- 不做第三方登录
- 不做复杂风控
- 不做多租户
- 不做完整邮箱验证，除非项目已有邮件服务

默认假设：
- 使用邮箱 + 密码登录
- 使用 JWT
- 密码必须哈希存储
- 先做 MVP

验收标准：
1. 新用户可以注册。
2. 已注册用户可以登录。
3. 错误密码不能登录。
4. 未登录访问受保护接口会返回 401。
5. 不要大范围重构无关模块。`,
 next:"请确认：是否需要邮箱验证？JWT 过期时间？是否已有用户表？是否需要忘记密码？"
 };
 if(exp)return {
 title:"订单/数据导出功能",complexity:"中",mode:"轻量 Spec",scores:[78,70,64,81],
 goal:"为列表增加导出能力，优先实现当前筛选条件下的 CSV 导出。",
 scope:["导出当前筛选条件下的数据","生成 CSV 文件","权限控制","基础导出数量限制"],
 nonGoals:["暂不做异步导出","暂不做复杂报表模板","暂不导出敏感字段"],
 assumptions:["导出格式为 CSV","字段使用列表主要展示字段","只允许管理员导出","单次最多导出 5000 条"],
 questions:["是否必须支持 Excel/xlsx？","导出字段是否包含手机号/地址等敏感信息？","数据量是否可能超过 5000 条？","是否需要操作审计日志？"],
 acceptance:["管理员可以点击导出并下载 CSV","导出内容符合当前筛选条件","普通用户不能看到或调用导出","超过限制时给出明确提示"],
 risks:["大数据量导出可能阻塞请求","敏感字段导出涉及权限和合规","当前筛选条件和导出条件不一致会导致用户困惑"],
 prompt:`请实现列表 CSV 导出功能。

目标：
- 管理员可以导出当前筛选条件下的数据为 CSV。

范围：
- 后端导出接口
- 前端导出按钮
- 权限校验
- 导出数量限制

非目标：
- 不做异步导出
- 不做复杂报表系统
- 不导出敏感字段，除非明确要求

默认假设：
- CSV 格式
- 字段使用列表主要展示字段
- 单次最多 5000 条
- 仅管理员可用

验收标准：
1. 当前筛选条件会应用到导出结果。
2. 管理员能下载 CSV。
3. 非管理员不能导出。
4. 超过数量限制时返回清晰错误。
5. 不要影响现有列表查询。`,
 next:"请确认：导出格式是否必须 xlsx？字段有哪些？最大导出量？是否需要审计日志？"
 };
 if(search)return {
 title:"列表搜索/筛选功能",complexity:"低",mode:"三行需求卡",scores:[82,75,72,85],
 goal:"为现有列表增加关键词搜索或基础筛选能力。",
 scope:["关键词输入","列表过滤","空关键词恢复全部","基础 loading/error 状态"],
 nonGoals:["暂不做高级搜索语法","暂不做全文检索系统","暂不做复杂组合条件"],
 assumptions:["按名称/标题/邮箱等主要字段模糊搜索","搜索触发方式为输入后 debounce","保留现有分页逻辑"],
 questions:["搜索字段具体是哪几个？","搜索是在前端过滤还是后端查询？","是否需要和分页、排序、筛选条件联动？"],
 acceptance:["输入关键词后列表展示匹配结果","清空关键词后恢复默认列表","搜索过程中有 loading 或状态反馈","无结果时显示空状态"],
 risks:["前端过滤和后端查询的选择会影响性能","分页和搜索联动容易出现结果不一致"],
 prompt:`请为现有列表增加关键词搜索功能。

目标：
- 用户输入关键词后，列表展示匹配结果。

范围：
- 搜索输入框
- 搜索请求或前端过滤
- 空状态
- 与现有分页基础联动

非目标：
- 不做高级搜索语法
- 不做全文检索
- 不做复杂组合筛选

默认假设：
- 按主要字段模糊搜索
- 使用 debounce 降低请求频率
- 清空关键词恢复默认列表

验收标准：
1. 输入关键词后结果变化。
2. 清空关键词后恢复。
3. 无结果时有提示。
4. 不破坏现有分页和排序。`,
 next:"请确认：搜索字段有哪些？前端过滤还是后端查询？是否要和分页/排序联动？"
 };
 return {
 title:"功能需求轻量澄清",complexity:"中",mode:"轻量 Spec",scores:[55,48,42,58],
 goal:"把原始需求整理为 AI coding agent 可执行的任务简报。",
 scope:["明确本次目标","暴露默认假设","列出关键追问","生成验收标准","生成可复制的 Agent Prompt"],
 nonGoals:["暂不生成完整 PRD","暂不做数据库/架构级设计","暂不替代人工最终决策"],
 assumptions:["优先实现 MVP","避免大范围重构","保持现有项目结构","先补齐最影响实现方向的问题"],
 questions:["目标用户是谁？","本次最小可用范围是什么？","哪些事情明确不做？","成功的验收标准是什么？","是否涉及权限、数据模型或外部系统？"],
 acceptance:["需求被重述为清晰目标","默认假设被明确列出","关键问题不超过 7 个","输出可直接交给 coding agent","包含明确非目标范围"],
 risks:["需求范围过大导致 AI 乱改","未声明非目标导致过度实现","缺少验收标准导致无法判断完成"],
 prompt:`请根据以下需求实现 MVP，并严格控制范围。

目标：
- ${t}

范围：
- 先实现最小可用版本。
- 保持现有项目结构。
- 只修改和本需求直接相关的文件。

非目标：
- 不做大范围重构。
- 不引入不必要的新依赖。
- 不实现未明确要求的高级功能。

默认假设：
- 用户希望快速验证功能。
- 优先可运行、可测试、可迭代。
- 遇到关键不确定点时先提出问题，不要自行扩大范围。

验收标准：
1. 功能能在本地运行。
2. 有清晰的使用路径。
3. 关键异常有处理。
4. 不破坏现有功能。
5. 输出修改说明和测试方式。`,
 next:"请补充：目标用户、本次最小范围、明确不做的内容、验收标准。"
 };
}
function li(xs){return xs.map(x=>`<li>${esc(x)}</li>`).join("")}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function render(d){
 out.innerHTML=`<div class="result">
 <div class="result-head"><div><div class="eyebrow">Agent Brief</div><h2>${esc(d.title)}</h2></div><div class="badges"><span class="badge">复杂度：${d.complexity}</span><span class="badge">${d.mode}</span></div></div>
 <div class="score"><div class="metric"><strong>${d.scores[0]}</strong><span>清晰度</span></div><div class="metric"><strong>${d.scores[1]}</strong><span>风险完整度</span></div><div class="metric"><strong>${d.scores[2]}</strong><span>验收可测性</span></div><div class="metric"><strong>${d.scores[3]}</strong><span>AI 可执行度</span></div></div>
 <div class="goal"><div class="label">目标重述</div><p>${esc(d.goal)}</p></div>
 <div class="grid">
 <article class="card"><h3>本次范围</h3><ul>${li(d.scope)}</ul></article>
 <article class="card"><h3>明确不做</h3><ul>${li(d.nonGoals)}</ul></article>
 <article class="card"><h3>默认假设</h3><ul>${li(d.assumptions)}</ul></article>
 <article class="card attention"><h3>关键追问</h3><ul>${li(d.questions)}</ul></article>
 <article class="card"><h3>验收标准</h3><ul>${li(d.acceptance)}</ul></article>
 <article class="card"><h3>返工风险</h3><ul>${li(d.risks)}</ul></article>
 </div>
 <article class="prompt card"><div class="prompt-head"><h3>给 Coding Agent 的 Prompt</h3><button id="copy">复制</button></div><pre>${esc(d.prompt)}</pre></article>
 <article class="card next"><h3>下一步回复模板</h3><p>${esc(d.next)}</p></article></div>`;
 $("#copy").onclick=async()=>{await navigator.clipboard.writeText(d.prompt);$("#copy").textContent="已复制";setTimeout(()=>$("#copy").textContent="复制",1200)}
}
$("#run").onclick=()=>render(analyze(input.value.trim()||""));
</script>
</body>
</html>
